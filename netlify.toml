# Build settings
[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"

# 301 redirect: old Netlify site -> new domain (mailgic.in)
[[redirects]]
  from = "/*"
  to = "https://mailgic.in/:splat"
  status = 301
  force = true

# Optional: keep sitemap available if needed (only if you want it to stay accessible on the old site too)
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
